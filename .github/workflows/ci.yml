name: ci

on:
  push:
    branches:
      - master
      - feat/**
      - fix/**
      - automation/**
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Validate key files exist
        run: |
          test -f README.md
          test -f Makefile
          test -f compose.yaml
          test -f .env.example
          test -f docs/OPENCLAW_AGENT_SPLIT.md
          test -f scripts/configure-openclaw-agents.sh
          test -f scripts/github-maintenance-report.sh
          test -f .github/workflows/github-caretaker.yml
          test -d context
          test -d context/council

      - name: Validate bash script syntax
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files 'scripts/*.sh')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No shell scripts found under scripts/."
            exit 1
          fi
          for file in "${files[@]}"; do
            echo "Checking $file"
            bash -n "$file"
          done

      - name: Validate important Makefile targets
        run: |
          grep -q '^up:' Makefile
          grep -q '^doctor:' Makefile
          grep -q '^doctor-plus:' Makefile
          grep -q '^worker-create:' Makefile
          grep -q '^worker-ready:' Makefile
          grep -q '^recover-session:' Makefile
          grep -q '^health-check:' Makefile

      - name: Validate context bootstrap files
        run: |
          test -f context/BOOTSTRAP.md
          test -f context/SESSION_STATE.md
          test -f context/SYSTEMMAP.md
          test -f context/RUNBOOK.md
          test -f context/BACKLOG.md

      - name: Validate GitHub automation contract
        run: node scripts/validate-github-automation.mjs

      - name: Validate council spawn manifest
        run: node scripts/council-manifest.mjs validate

      - name: Validate BMO routines
        run: node scripts/bmo-routines.mjs validate

      - name: Validate BMO operating system files
        run: node scripts/validate-bmo-operating-system.mjs

      - name: Validate continuity reporter
        run: node scripts/bmo-continuity-report.mjs --surface repo --site-runtime-url "" --output workflows/bmo-continuity.json
