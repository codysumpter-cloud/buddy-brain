name: skills-validation

on:
  pull_request:
    paths:
      - 'skills/**'
      - 'config/skills/**'
      - 'scripts/bmo-skill-pack.mjs'
      - 'scripts/validate-skills.mjs'
      - '.github/workflows/skills.yml'
  push:
    branches:
      - master
    paths:
      - 'skills/**'
      - 'config/skills/**'
      - 'scripts/bmo-skill-pack.mjs'
      - 'scripts/validate-skills.mjs'
      - '.github/workflows/skills.yml'

permissions:
  contents: read

jobs:
  validate-skills-registry:
    name: validate-skills-registry
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Validate skills registry
        run: node scripts/validate-skills.mjs

      - name: Validate BMO skill pack
        run: node scripts/bmo-skill-pack.mjs list
