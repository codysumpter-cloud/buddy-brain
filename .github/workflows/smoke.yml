name: bootstrap-smoke

on:
  pull_request:

permissions:
  contents: read

jobs:
  bootstrap-smoke-test:
    name: bootstrap-smoke-test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Make scripts executable
        run: chmod +x scripts/ci/bootstrap-smoke-test.sh

      - name: Run bootstrap smoke test
        run: scripts/ci/bootstrap-smoke-test.sh
